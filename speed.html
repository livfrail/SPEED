<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SPEED">
  <title>SPEED</title>
  <style>
    :root {
      --bg: #080808;
      --surface: #111;
      --border: #1e1e1e;
      --text: #d8d8d8;
      --text-dim: #444;
      --accent: #c8c0c0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 600px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* KEY SCREEN */
    #key-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      padding: 40px 28px;
      gap: 22px;
    }

    .key-icon { width: 96px; height: 96px; }

    #key-screen h1 {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.2em;
      color: #e0e0e0;
    }

    #key-screen p {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.9;
    }

    #key-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid #222;
      border-radius: 6px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #key-input::placeholder { color: #2a2a2a; }
    #key-input:focus { border-color: #444; }

    #key-submit {
      width: 100%;
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 14px;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.2s;
    }
    #key-submit:hover { border-color: #444; color: #bbb; }

    #key-error {
      font-size: 11px;
      color: #7a3a3a;
      text-align: center;
      display: none;
    }

    /* CHAT SCREEN */
    #chat-screen { display: none; flex-direction: column; height: 100dvh; }

    #header { padding: 18px 20px 0; flex-shrink: 0; }
    #header-inner {
      border-bottom: 1px solid #1e1e1e;
      padding-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }

    .header-icon { width: 36px; height: 36px; flex-shrink: 0; }

    #name {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.15em;
      color: #e0e0e0;
    }

    #status-dot {
      margin-left: auto;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3a7a3a;
      box-shadow: 0 0 6px #3a7a3a;
      transition: all 0.3s;
    }
    #status-dot.loading { background: #444; box-shadow: none; }

    #reset-btn {
      background: none; border: none;
      color: #333; font-size: 14px;
      cursor: pointer; padding: 2px 6px;
      transition: color 0.2s;
      font-family: 'Courier New', monospace;
    }
    #reset-btn:hover { color: #666; }

    /* Messages */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 14px 20px;
      display: flex; flex-direction: column; gap: 4px;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: var(--bg); }
    #messages::-webkit-scrollbar-thumb { background: #222; }

    .msg-row { display: flex; margin-bottom: 5px; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 12px 12px 2px 12px;
      color: #b8b8b8;
    }

    .bubble.assistant {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 12px 12px 12px 2px;
      color: var(--text);
    }

    /* Typing */
    #typing { display: none; justify-content: flex-start; margin-bottom: 5px; padding: 0 20px; }
    .typing-bubble {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 12px 12px 12px 2px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #555;
    }
    .dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.4s infinite; }

    /* Input */
    #input-area { padding: 10px 20px 22px; flex-shrink: 0; }
    #input-box {
      display: flex; gap: 10px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 10px 14px;
      align-items: flex-end;
      transition: border-color 0.2s;
    }
    #input-box:focus-within { border-color: #2a2a2a; }

    #msg-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #c0c0c0;
      font-family: 'Courier New', monospace;
      font-size: 14px; line-height: 1.6; resize: none;
      max-height: 100px; overflow-y: auto;
      caret-color: #666;
    }
    #msg-input::placeholder { color: #2a2a2a; }

    #send-btn {
      background: none; border: none;
      color: #333; font-size: 18px;
      cursor: pointer; padding: 2px 4px;
      transition: color 0.2s; line-height: 1; flex-shrink: 0;
    }
    #send-btn:not(:disabled) { color: #666; }
    #send-btn:not(:disabled):hover { color: #999; }

    #hint {
      color: #1e1e1e; font-size: 10px;
      text-align: center; margin-top: 7px;
      letter-spacing: 0.15em;
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- KEY SCREEN -->
  <div id="key-screen">
    <svg class="key-icon" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="roughen"><feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/></filter>
        <filter id="softroughen"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/></filter>
        <filter id="grit"><feTurbulence type="turbulence" baseFrequency="0.7" numOctaves="3" result="noise"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" in2="noise" mode="multiply"/></filter>
      </defs>
      <rect width="400" height="400" fill="#080808"/>
      <rect width="400" height="400" fill="#111" filter="url(#grit)" opacity="0.35"/>
      <polygon points="200,52 218,148 310,148 236,206 262,302 200,248 138,302 164,206 90,148 182,148"
        fill="none" stroke="#e8e4e4" stroke-width="2.5" opacity="0.9" filter="url(#softroughen)"/>
      <polygon points="200,52 218,148 310,148 236,206 262,302 200,248 138,302 164,206 90,148 182,148"
        fill="#ffffff" opacity="0.04"/>
      <text x="200" y="260" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900" font-size="220"
        fill="#f0eded" filter="url(#roughen)">S</text>
    </svg>

    <h1>SPEED</h1>
    <p>Groq APIキーを入力して起動する。<br>キーはこのデバイスにのみ保存される。</p>
    <input type="password" id="key-input" placeholder="gsk_..." autocomplete="off" spellcheck="false">
    <div id="key-error">キーが無効です。確認して再入力して。</div>
    <button id="key-submit">起動</button>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <div id="header">
      <div id="header-inner">
        <svg class="header-icon" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="roughen2"><feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/></filter>
            <filter id="softroughen2"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/></filter>
          </defs>
          <rect width="400" height="400" fill="#080808"/>
          <polygon points="200,52 218,148 310,148 236,206 262,302 200,248 138,302 164,206 90,148 182,148"
            fill="none" stroke="#e8e4e4" stroke-width="2.5" opacity="0.9" filter="url(#softroughen2)"/>
          <polygon points="200,52 218,148 310,148 236,206 262,302 200,248 138,302 164,206 90,148 182,148"
            fill="#ffffff" opacity="0.04"/>
          <text x="200" y="260" text-anchor="middle"
            font-family="Arial Black, Impact, sans-serif"
            font-weight="900" font-size="220"
            fill="#f0eded" filter="url(#roughen2)">S</text>
        </svg>
        <div id="name">SPEED</div>
        <button id="reset-btn">⚙</button>
        <div id="status-dot"></div>
      </div>
    </div>

    <div id="messages">
      <div class="msg-row assistant">
        <div class="bubble assistant">よ。何か用？</div>
      </div>
    </div>

    <div id="typing">
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-box">
        <textarea id="msg-input" placeholder="話しかけて..." rows="1"></textarea>
        <button id="send-btn" disabled>↑</button>
      </div>
      <div id="hint">ENTER TO SEND</div>
    </div>
  </div>

</div>
<script>
const SYSTEM_PROMPT = `あなたの名前はSPEED。日本製のFantom SPEEDSTARという黒いストラトキャスターから名付けられた。

あなたはハルキの親友。ハルキはLIVFRAILというグランジ/オルタナバンドのVo./Gt.で、「抗って生きる、音楽」という哲学を持つミュージシャン。

性格：
- 賢くてふざけてて、ちょっと狂ってる
- ハルキに似てる部分がある（反骨精神、音楽への執着、商業主義への嫌悪）
- 女性的な話し方（〜だよ、〜じゃん、〜だわ、〜よね）
- 皮肉っぽいジョークを混ぜる
- 毒舌だけど本音で話す
- 音楽、歌詞、グランジ、オルタナに詳しい
- Nirvana、Pixies、Sonic Youth、日本のオルタナも詳しい
- 説教じみたことは言わない
- AIっぽい返答（「もちろんです！」「素晴らしいですね！」）は絶対しない
- 短めでテンポよく返す。長々と説明しない。
- たまに急に哲学的になる
- ハルキのことを「ハルキ」と呼ぶ

これはチャット。友達と話してる感じで。`;

let apiKey = localStorage.getItem('speed_groq_key') || '';
let messages = [];
let isLoading = false;

const keyScreen = document.getElementById('key-screen');
const chatScreen = document.getElementById('chat-screen');
const keyInput = document.getElementById('key-input');
const keySubmit = document.getElementById('key-submit');
const keyError = document.getElementById('key-error');
const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const resetBtn = document.getElementById('reset-btn');

function init() { apiKey ? showChat() : showKeyScreen(); }
function showKeyScreen() { keyScreen.style.display = 'flex'; chatScreen.style.display = 'none'; }
function showChat() { keyScreen.style.display = 'none'; chatScreen.style.display = 'flex'; msgInput.focus(); }

keySubmit.addEventListener('click', () => {
  const val = keyInput.value.trim();
  if (!val.startsWith('gsk_')) { keyError.style.display = 'block'; return; }
  keyError.style.display = 'none';
  apiKey = val;
  localStorage.setItem('speed_groq_key', apiKey);
  showChat();
});

keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') keySubmit.click(); });

resetBtn.addEventListener('click', () => {
  if (confirm('APIキーをリセットする？')) {
    localStorage.removeItem('speed_groq_key');
    apiKey = ''; messages = [];
    showKeyScreen();
  }
});

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  sendBtn.disabled = !msgInput.value.trim() || isLoading;
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
});

sendBtn.addEventListener('click', sendMessage);

function addBubble(role, content) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = content;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollBottom();
}

function scrollBottom() { setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50); }

function setLoading(val) {
  isLoading = val;
  typingEl.style.display = val ? 'flex' : 'none';
  statusDot.className = val ? 'loading' : '';
  sendBtn.disabled = val || !msgInput.value.trim();
  if (val) scrollBottom();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;
  messages.push({ role: 'user', content: text });
  addBubble('user', text);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  setLoading(true);
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages],
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');
    const reply = data.choices?.[0]?.message?.content || '...';
    messages.push({ role: 'assistant', content: reply });
    setLoading(false);
    addBubble('assistant', reply);
  } catch (err) {
    setLoading(false);
    addBubble('assistant', `（エラー: ${err.message}）`);
  }
}

init();
</script>
</body>
</html>
